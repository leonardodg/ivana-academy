name: Deploy DEVELOP Sandbox to GCP

on: [push]

jobs:
  start-sandbox:
    runs-on: ubuntu-latest
    environment: development
    outputs:
      vm_ip: ${{ steps.get_ip.outputs.ip }}
    steps:
      - uses: actions/checkout@v3
      - id: 'auth'
        uses: 'google-github-actions/auth@v1'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - name: Start VM
        run: |
          STATUS=$(gcloud compute instances describe ${{ secrets.GCP_VM_NAME }} \
            --zone=${{ secrets.GCP_ZONE }} \
            --format='get(status)')

          if [ "$STATUS" != "RUNNING" ]; then
            echo "A VM está $STATUS. Ligando agora..."
            gcloud compute instances start ${{ secrets.GCP_VM_NAME }} --zone=${{ secrets.GCP_ZONE }} || echo "Recurso esgotado no Google Cloud agora."
            sleep 20
          else
            echo "The VM is already connected. Status: $STATUS"
          fi
      - name: Get IP
        id: get_ip
        run: |
          VM_IP=$(gcloud compute instances describe ${{ secrets.GCP_VM_NAME }} \
            --zone=${{ secrets.GCP_ZONE }} \
            --format='get(networkInterfaces[0].accessConfigs[0].natIP)')

          echo "ip=$VM_IP" >> $GITHUB_OUTPUT
          echo "Connecting to IP: $VM_IP"

  docker:
    name: Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: leodg/moodle-academy:develop

  integration:
    name: Integration checks
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checking out moodle
        uses: actions/checkout@v4
        with:
          repository: leonardodg/ivana-academy
          ref: develop

      - name: Prepare moodle-docker environment
        run: |
          cp config.docker-develop.php config.php
          echo "Running integration tests from ${basedir}"
          echo ${basedir}
          echo ${MOODLE_DOCKER_WWWROOT}
          export ASSETDIR="${basedir}/assets"
          docker compose -f "docker-compose-develop.yml" up -d
        env:
          MOODLE_DOCKER_WWWROOT: /var/www/html/
          basedir: ${{ github.workspace }}

      - name: Run moodle-docker tests
        shell: bash
        run: |
          echo "Checking that PHP CLI is available"
          docker compose exec -T webserver php -r 'echo "Up!";'
          echo "Checking that the web server is up"

      - name: Stop moodle-docker
        run: |
          echo "Stopping down container"
          docker compose -f "${basedir}/docker-compose-develop.yml" down
        env:
          MOODLE_DOCKER_WWWROOT: /var/www/html/
          basedir: ${{ github.workspace }}

  deploy-sandbox:
    name: Deploy to GCP VM
    needs: [start-sandbox, docker, integration]
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Diagnóstico de IP
        run: |
          echo "the IP of JOB previous is: ${{ needs.start-sandbox.outputs.vm_ip }}"
          if [ -z "${{ needs.start-sandbox.outputs.vm_ip }}" ]; then
            echo "ERRO: The output 'IP' is EMPTY!"
            exit 1
          fi
      - name: Checkout Source
        uses: actions/checkout@v4
      - name: Deploy via SSH by RSYNC
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i"
          REMOTE_HOST: ${{ needs.start-sandbox.outputs.vm_ip }}
          REMOTE_USER: leonardodg
          TARGET: /home/leonardodg/public_html
          SCRIPT_BEFORE: |
            sudo apt install rsync -y
          SCRIPT_AFTER: |
            whoami
            ls -al
            echo $RSYNC_STDOUT
            cp /home/leonardodg/public_html/config-docker.php /home/leonardodg/public_html/config.php

      - name: Deploy to GCP VM Instance
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ needs.start-sandbox.outputs.vm_ip }}
          username: leonardodg
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker stop moodle || true
            docker rm moodle || true
            docker pull leodg/moodle-academy:develop
            docker run --restart=always --name moodle -p 80:80 -p 443:443 -v /home/leonardodg/public_html:/var/www/html -v /home/leonardodg/moodledata:/var/www/moodledata -v /etc/letsencrypt/:/etc/letsencrypt/ -e MOODLE_URL=${{ vars.MOODLE_URL }} -e MOODLE_DBTYPE=${{ vars.MOODLE_DBTYPE }} -e MOODLE_DBHOST=${{ secrets.MOODLE_DBHOST }} -e MOODLE_DBNAME=${{ secrets.MOODLE_DBNAME }} -e MOODLE_DBUSER=${{ secrets.MOODLE_DBUSER }} -e MOODLE_DBPASS=${{ secrets.MOODLE_DBPASS }} -e MOODLE_DATA=/var/www/moodledata -e ENVIRONMENT=develop -d leodg/moodle-academy:develop
