
# =============================================================================
# BASE COMPOSE — Shared configuration between all environments
# =============================================================================
# Usage:
#   Dev:  docker compose -f .devcontainer/compose/base.yml -f .devcontainer/compose/dev.yml up
#   Prod: docker compose -f .devcontainer/compose/base.yml -f .devcontainer/compose/prod.yml up
# =============================================================================

name: ivana-academy

# =============================================================================
#                           SHARED RESOURCES
# =============================================================================
volumes:
  dbdata:
  moodledata:
  composer_cache:

secrets:
  db_root_password:
    file: ../secrets/db_root_password
  db_password:
    file: ../secrets/db_password
  db_user:
    file: ../secrets/db_user
  ssl_cert:
    file: ../certs/develop-local.crt
  ssl_key:
    file: ../certs/develop-local.key

networks:
  moodle_network:
    driver: bridge
    name: moodle_network