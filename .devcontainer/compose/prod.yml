# =============================================================================
# PRODUCTION — Optimized for production deployment
# =============================================================================
# Usage:
#     docker compose -f .devcontainer/compose/base.yml -f .devcontainer/compose/prod.yml up -d
# =============================================================================

services:
  moodle:
    image: leodg/moodle-academy:production
    restart: unless-stopped
    env_file:
      - ../env/production.env
    environment:
      - MOODLE_URL=https://ivana.academy
      - ENVIRONMENT=production
      - PHP_OPCACHE_VALIDATE_TIMESTAMPS=0
      - MOODLE_DEBUG=MINIMAL
      - MOODLE_DEBUG_DISPLAY=0
    ports:
      - "80:80"
      - "443:443"
    networks:
      - moodle_network
    secrets:
      - ssl_cert
      - ssl_key
    volumes:
      - /var/www/html/.devcontainer  # no show folder

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

secrets:
  ssl_cert:
    file: ../certs/develop-local.crt
  ssl_key:
    file: ../certs/develop-local.key