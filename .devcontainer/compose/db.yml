services:
  # =========================================================================
  #                    SERVICE: db (MySQL/MariaDB)
  # =========================================================================
  db:
    image: mariadb:11.4
    restart: unless-stopped
    command: >
          --character-set-server=utf8mb4
          --collation-server=utf8mb4_bin
          --innodb_file_per_table=On
          --wait-timeout=28800
          --skip-log-bin
    env_file:
      - ../env/db.env
    environment:
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MARIADB_DATABASE:      ${MOODLE_DBNAME:-moodle}
      MARIADB_USER:          ${MOODLE_DBUSER:-moodle}
      MARIADB_PASSWORD:      ${MOODLE_DBPASS:-moodle}
      MARIADB_ROOT_HOST:     "%"  # opcional: allow connection from any host
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306/tcp"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - moodle_network
    secrets:
      - db_root_password

