# =============================================================================
# DEVELOPMENT — Local development with hot-reload
# =============================================================================
# Usage:
#     docker compose -f .devcontainer/compose/base.yml -f .devcontainer/compose/db.yml -f .devcontainer/compose/dev.yml up -d
# =============================================================================

services:
  moodle:
    image: leodg/moodle-academy:development
    restart: no
    env_file:
      - ../env/development.env
    environment:
      - MOODLE_URL=https://develop.ivana.academy
      - ENVIRONMENT=development
      - PHP_OPCACHE_VALIDATE_TIMESTAMPS=1
      - MOODLE_DEBUG=DEVELOPER
      - MOODLE_DEBUG_DISPLAY=1
    depends_on:
      db:
        condition: service_healthy
    secrets:
    - ssl_cert
    - ssl_key
    networks:
      - moodle_network
    ports:
      - "${MOODLE_HTTP_PORT:-80}:80"
      - "${MOODLE_HTTPS_PORT:-443}:443"
      - "9003:9003" # Xdebug
    volumes:
      - "../../:/var/www/html"
      - "../../../moodledata:/var/www/moodledata"
      - /var/www/html/.devcontainer  # no show folder
      - composer_cache:/root/.composer

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s


